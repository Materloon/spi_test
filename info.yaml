# Tiny Tapeout project information
project:
  title:        "SPI Test"      # Project title
  author:       "Massimo Bruschi"      # Your name
  discord:      "HI-LO"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A simple SPI Slave module adapted to TinyTapeout"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_spi_slave"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_spi_slave.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "sck"
  ui[1]: "ss_n"
  ui[2]: "mosi"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "miso_out"
  uo[1]: "rx_byte[1]"
  uo[2]: "rx_byte[2]"
  uo[3]: "rx_byte[3]"
  uo[4]: "rx_byte[4]"
  uo[5]: "rx_byte[5]"
  uo[6]: "rx_byte[6]"
  uo[7]: "rx_byte[7]"

  # Bidirectional pins
  uio[0]: "unused"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
